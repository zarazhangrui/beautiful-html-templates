<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stephen Xu — Monochrome Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #fafadf;
      --c-fg: #1a1a16;
      --c-fg-2: #5e5e54;
      --c-fg-3: #8a8a80;
      --c-accent: #1a1a16;
      --c-border: #1a1a16;
      --c-border-light: rgba(26,26,22,0.18);
      --f-display: "Jost", "Noto Sans SC", system-ui, sans-serif;
      --f-serif: "Lora", "Noto Serif SC", Georgia, serif;
      --f-mono: "JetBrains Mono", monospace;
      --pad-x: 8vw;
      --pad-y: 6vh;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--c-bg);
      -webkit-font-smoothing: antialiased;
    }

    .slide {
      width: 100vw; height: 100vh;
      position: relative;
      /* Extra left padding for gutter */
      padding: var(--pad-y) var(--pad-x) var(--pad-y) calc(var(--pad-x) + 3.5vw);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    /* Left gutter spine */
    .gutter-line {
      position: absolute;
      left: calc(var(--pad-x) + 0.5vw);
      top: var(--pad-y);
      bottom: var(--pad-y);
      width: 1px;
      background: var(--c-border-light);
    }

    /* Cover body — bottom-anchored */
    .cover-body {
      display: flex;
      flex-direction: column;
      gap: 2vh;
    }

    /* The giant display name */
    .display-name {
      font-family: var(--f-display);
      font-size: 9vw;
      font-weight: 200;
      line-height: 0.96;
      letter-spacing: -0.02em;
      color: var(--c-fg);
    }
    .display-name .cn {
      font-family: "Noto Sans SC", var(--f-display);
      font-weight: 200;
      font-size: 7.5vw;
      display: block;
      color: var(--c-fg-2);
      letter-spacing: 0.05em;
      margin-top: 0.15em;
    }

    /* Lead tagline */
    .lead {
      font-family: var(--f-display);
      font-size: clamp(1rem, 1.5vw, 1.4rem);
      font-weight: 300;
      line-height: 1.65;
      color: var(--c-fg-2);
      max-width: 55vw;
    }

    /* Meta bar */
    .cover-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 3vh;
      padding-top: 1.5vh;
      border-top: 1px solid var(--c-border-light);
    }
    .cover-meta .meta-left,
    .cover-meta .meta-right {
      font-family: var(--f-mono);
      font-size: 0.72vw;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-fg-3);
    }
    .cover-meta .meta-right {
      text-align: right;
    }

    /* Template badge */
    .template-badge {
      position: absolute; top: 3vh; right: 3vw;
      font-family: var(--f-mono);
      font-size: 0.65vw;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--c-fg-3);
      border: 1px solid var(--c-border-light);
      padding: 0.4rem 0.8rem;
    }

    /* Slide counter */
    #slide-counter {
      position: fixed; bottom: 20px; right: 28px;
      font-family: var(--f-mono);
      font-size: 10px; letter-spacing: 0.12em;
      color: rgba(26,26,22,0.28);
    }
  </style>
</head>
<body>
  <div class="slide light">
    <div class="gutter-line"></div>
    <div class="template-badge">Option 3 · Monochrome</div>

    <div class="cover-body">
      <div class="display-name">
        Stephen Xu
        <span class="cn">许烁锋</span>
      </div>
      <p class="lead">
        A product-minded generalist with a passion for building things that matter —
        bridging creativity, strategy, and execution across global markets.
      </p>
      <div class="cover-meta">
        <span class="meta-left">Personal Portfolio · 2026</span>
        <span class="meta-right">Open to Opportunities Worldwide</span>
      </div>
    </div>
  </div>
  <div id="slide-counter">01 / 01</div>
</body>
</html>
