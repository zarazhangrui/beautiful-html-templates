<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stephen Xu — Blue Professional Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfae7;
      --primary: #1e2bfa;
      --text: #111111;
      --text-muted: #6b6b6b;
      --text-light: #9a9a9a;
      --accent-light: rgba(30, 43, 250, 0.08);
      --border: rgba(30, 43, 250, 0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .slide {
      width: 100vw; height: 100vh;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding-left: 8vw;
    }
    /* Right panel decoration */
    .cover-decoration {
      position: absolute; top: 0; right: 0;
      width: 35vw; height: 100vh;
      background: var(--accent-light);
      clip-path: polygon(30% 0, 100% 0, 100% 100%, 0% 100%);
    }
    /* Dot grid */
    .cover-dots {
      position: absolute; bottom: 12vh; right: 8vw;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; opacity: 0.25;
    }
    .cover-dots .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
    /* Accent bar */
    .accent-line { width: 60px; height: 4px; background: var(--primary); border-radius: 2px; margin-bottom: 1.5rem; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.8rem, 5vw, 4.2rem);
      font-weight: 700; line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 55vw; margin-bottom: 0.6rem;
    }
    .name-en {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      font-weight: 400; color: var(--primary);
      letter-spacing: 0.04em; margin-bottom: 1.5rem;
    }
    .subtitle {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      color: var(--text-muted); max-width: 38vw;
      margin-bottom: 3rem; font-weight: 400; line-height: 1.6;
    }
    .meta {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem; color: var(--text-light);
      letter-spacing: 0.05em;
    }
    /* Template label */
    .template-badge {
      position: absolute; top: 3vh; right: 3vw;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem; font-weight: 500;
      color: var(--primary);
      background: var(--accent-light);
      padding: 0.35rem 0.9rem; border-radius: 100px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="cover-decoration"></div>
    <div class="cover-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="template-badge">Option 1 · Blue Professional</div>
    <div class="accent-line"></div>
    <h1>许烁锋</h1>
    <p class="name-en">Stephen Xu</p>
    <p class="subtitle">Bridging creativity and execution — a product-minded generalist with a passion for building things that matter across global markets.</p>
    <p class="meta">Personal Portfolio &nbsp;·&nbsp; 2026</p>
  </div>
</body>
</html>
