<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stephen Xu — Signal Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,600;1,8..60,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --c-bg:            #1c2644;
    --c-bg-alt:        #232f55;
    --c-fg:            #e2dcd0;
    --c-fg-2:          #8a96a8;
    --c-fg-3:          #4e5a6e;
    --c-accent:        #c8a870;
    --c-border:        #2e3d5c;
    --f-display:       "Source Serif 4", "Noto Serif SC", Georgia, serif;
    --f-body:          "DM Sans", "Noto Sans SC", system-ui, sans-serif;
    --f-mono:          "IBM Plex Mono", monospace;
    --pad-x:           7.5vw;
    --pad-y:           5.5vh;
    --gap-lg:          4vh;
    --gap-md:          2.5vh;
    --gap-sm:          1.2vh;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--c-bg);
    -webkit-font-smoothing: antialiased;
  }

  /* subtle grid fingerprint */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  .slide {
    width: 100vw; height: 100vh;
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: var(--pad-y) var(--pad-x);
    color: var(--c-fg);
  }

  .cover-body {
    display: flex;
    flex-direction: column;
    gap: var(--gap-md);
  }

  /* kicker */
  .kicker {
    font-family: var(--f-mono);
    font-size: 0.7vw;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--c-accent);
  }

  /* display name */
  .display {
    font-family: var(--f-display);
    font-size: 9.5vw;
    font-weight: 700;
    line-height: 0.96;
    letter-spacing: -0.02em;
    color: var(--c-fg);
  }
  .display em {
    font-style: italic;
    color: var(--c-accent);
  }

  /* chinese sub-name */
  .cn-name {
    font-family: "Noto Serif SC", var(--f-display);
    font-size: 3vw;
    font-weight: 300;
    line-height: 1.1;
    color: var(--c-fg-2);
    letter-spacing: 0.05em;
    margin-top: 0.3vh;
  }

  /* lead tagline */
  .lead {
    font-family: var(--f-body);
    font-size: 1.4vw;
    font-weight: 400;
    line-height: 1.58;
    color: var(--c-fg-2);
    max-width: 52vw;
  }
  .lead em {
    font-style: italic;
    color: var(--c-accent);
    font-family: var(--f-display);
  }

  /* cover meta bar */
  .cover-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: var(--gap-lg);
    padding-top: var(--gap-sm);
    border-top: 1px solid var(--c-border);
  }
  .cover-meta .meta-left,
  .cover-meta .meta-right {
    font-family: var(--f-mono);
    font-size: 0.7vw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--c-fg-3);
  }
  .cover-meta .meta-right { text-align: right; }

  /* decorative accent rule */
  .rule {
    width: 36px; height: 1px;
    background: var(--c-accent);
  }

  /* slide counter */
  #slide-counter {
    position: fixed; bottom: 20px; right: 28px;
    font-family: var(--f-mono);
    font-size: 10px; letter-spacing: 0.12em;
    color: rgba(255,255,255,.2);
    z-index: 100;
  }

  /* preview badge */
  .badge {
    position: fixed; top: 16px; right: 16px;
    font-family: var(--f-mono);
    font-size: 0.65vw; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--c-accent);
    border: 1px solid var(--c-accent);
    padding: 0.4em 0.9em;
    z-index: 100;
  }
</style>
</head>
<body>
  <div class="badge">Option 2 · Signal</div>
  <div class="slide">
    <div class="cover-body">
      <div class="kicker">Personal Portfolio · 2026</div>

      <div>
        <div class="display">Stephen <em>Xu</em></div>
        <div class="cn-name">许烁锋</div>
      </div>

      <div class="rule"></div>

      <p class="lead">
        A product-minded generalist with a passion for building things that matter —
        bridging <em>creativity, strategy, and execution</em> across global markets.
      </p>

      <div class="cover-meta">
        <span class="meta-left">Open to Opportunities Worldwide</span>
        <span class="meta-right">Personal Portfolio &nbsp;·&nbsp; May 2026</span>
      </div>
    </div>
  </div>
  <div id="slide-counter">01 / TBD</div>
</body>
</html>
